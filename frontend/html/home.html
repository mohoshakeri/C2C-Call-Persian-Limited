<!doctype html>
<html lang="fa" dir="rtl">
    <head>
        <title>{{BRAND_NAME}} - تماس ویدیویی رمزنگاری شده</title>

        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
        />
        <meta name="robots" content="noindex, nofollow" />

        <link rel="apple-touch-icon" href="../images/favicon.png" />
        <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
        <link rel="stylesheet" href="../css/home.css" />
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../libs/css/all.min.css" />

        <script defer src="../libs/js/xss.min.js"></script>
        <script defer src="../libs/js/axios.min.js"></script>
        <script defer src="../js/home.js"></script>
    </head>
    <body>
        <form id="joinForm" autocomplete="off" class="join-form">
            <div class="form-header">
                <div class="form-logo">
                    <img src="../images/logo.svg" alt="{{BRAND_NAME}}" />
                </div>
                <h2>شروع تماس ویدیویی</h2>
                <p>ارتباط چهره به چهره</p>
            </div>

            <div class="input-group">
                <label for="room"><i class="fas fa-door-open"></i> اتاق</label>
                <div class="input-container">
                    <input
                        id="roomIdInput"
                        type="text"
                        name="room"
                        placeholder="مثلاً my-meeting"
                        maxlength="36"
                        required
                    />
                    <button
                        type="button"
                        id="randomRoomBtn"
                        class="input-btn"
                        title="ایجاد اتاق تصادفی"
                        aria-label="ایجاد اتاق تصادفی"
                    >
                        <i class="fa fa-random"></i>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="username"><i class="fas fa-user"></i> نام</label>
                <div class="input-container">
                    <input
                        id="userNameInput"
                        type="text"
                        name="name"
                        placeholder="نام نمایشی شما"
                        maxlength="36"
                        required
                    />
                    <button
                        type="button"
                        id="randomUserBtn"
                        class="input-btn"
                        title="ایجاد نام تصادفی"
                        aria-label="ایجاد نام تصادفی"
                    >
                        <i class="fa fa-random"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="joinBtn" class="join-button">
                <i class="fas fa-video"></i>
                <span>ورود به تماس</span>
            </button>

            <div class="form-divider">
                <span><a href="/privacy" class="privacy-link">سیاست حریم خصوصی</a></span>
            </div>

            <button id="supportBtn" class="support-btn">&copy; 2026 {{BRAND_NAME}}</button>
        </form>
    </body>
</html>
